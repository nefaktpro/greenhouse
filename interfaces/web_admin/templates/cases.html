{% extends "base.html" %}

{% block content %}
<section class="page">
  <div class="page-header">
    <div>
      <h1>Cases</h1>
      <p>Кандидаты в кейсы из follow-up / observations. Пока это draft, не истина.</p>
    </div>
    <button class="btn" onclick="loadCases()">Обновить</button>
  </div>

  <div class="card">
    <h2>Case candidates</h2>
    <div id="caseStatus" class="muted">Загрузка...</div>
    <div id="caseList" class="stack"></div>
  </div>
</section>

<script>
async function apiPost(url) {
  const res = await fetch(url, {method: "POST"});
  const data = await res.json();
  if (!data.ok) alert("Ошибка: " + JSON.stringify(data));
  await loadCases();
}

async function approveCase(id) {
  await apiPost(`/api/case-candidates/${encodeURIComponent(id)}/approve`);
}

async function rejectCase(id) {
  await apiPost(`/api/case-candidates/${encodeURIComponent(id)}/reject`);
}

async function loadCases() {
  const status = document.getElementById("caseStatus");
  const list = document.getElementById("caseList");
  status.textContent = "Загрузка...";
  list.innerHTML = "";

  const res = await fetch("/api/case-candidates?limit=100");
  const data = await res.json();

  if (!data.ok) {
    status.textContent = "Ошибка загрузки";
    return;
  }

  status.textContent = `Всего показано: ${data.count}`;

  if (!data.items.length) {
    list.innerHTML = `<div class="muted">Кандидатов пока нет.</div>`;
    return;
  }

  list.innerHTML = data.items.slice().reverse().map(c => {
    const id = c.case_candidate_id || "";
    const buttons = c.status !== "approved"
      ? `<div class="actions">
           <button class="btn" onclick="approveCase('${escapeAttr(id)}')">✅ Approve</button>
           <button class="btn" onclick="rejectCase('${escapeAttr(id)}')">❌ Reject</button>
         </div>`
      : `<div class="muted">Статус: ${escapeHtml(c.status || "")}</div>`;

    return `
      <div class="mini-card">
        <div><b>${escapeHtml(c.title || c.case_type || "case_candidate")}</b></div>
        <div class="muted">${escapeHtml(c.created_at || "")} · ${escapeHtml(c.case_type || "")} · status: ${escapeHtml(c.status || "")} · confidence: ${escapeHtml(c.confidence ?? "")}</div>
        <div>${escapeHtml(c.conclusion || "")}</div>
        ${buttons}
        <pre>${escapeHtml(JSON.stringify(c, null, 2))}</pre>
      </div>
    `;
  }).join("");
}

function escapeHtml(s) {
  return String(s ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function escapeAttr(s) {
  return String(s ?? "")
    .replaceAll("\\", "\\\\")
    .replaceAll("'", "\\'")
    .replaceAll('"', "&quot;");
}

loadCases();
</script>
{% endblock %}
