{% extends "base.html" %}
{% block content %}

<section class="cards-grid">

  <article class="card">
    <div class="card-label">SYSTEM</div>
    <h3>Текущий режим</h3>
    <div id="modeBlock">Загрузка...</div>
  </article>

  <article class="card">
    <div class="card-label">ASK</div>
    <h3>Ожидание</h3>
    <div id="askBlock">Загрузка...</div>
  </article>

  <article class="card">
    <div class="card-label">MONITORING</div>
    <h3>Обзор</h3>
    <div id="monitoringBlock">Загрузка...</div>
  </article>

  <article class="card">
    <div class="card-label">SAFETY</div>
    <h3>Безопасность</h3>
    <div id="safetyBlock">Загрузка...</div>
  </article>

</section>

<script>
async function loadDashboard() {

  try {
    let mode = await fetch("/api/modes/current").then(r=>r.json())
    document.getElementById("modeBlock").innerHTML =
      "<b>" + mode.data.state.mode + "</b>"
  } catch(e) {
    document.getElementById("modeBlock").innerText = "Ошибка"
  }

  try {
    let ask = await fetch("/api/ask/current").then(r=>r.json())
    document.getElementById("askBlock").innerHTML =
      ask.data.has_pending
        ? "<b>Есть действие</b><br>" + (ask.data.item?.title || "")
        : "Нет ожиданий"
  } catch(e) {
    document.getElementById("askBlock").innerText = "Ошибка"
  }

  try {
    let mon = await fetch("/api/monitoring/overview").then(r=>r.json())
    document.getElementById("monitoringBlock").innerHTML =
      "Датчиков: " + mon.count
  } catch(e) {
    document.getElementById("monitoringBlock").innerText = "Ошибка"
  }

  try {
    let saf = await fetch("/api/monitoring/safety").then(r=>r.json())
    document.getElementById("safetyBlock").innerHTML =
      "Проверок: " + saf.count
  } catch(e) {
    document.getElementById("safetyBlock").innerText = "Ошибка"
  }

}

loadDashboard()
</script>

{% endblock %}
