{% extends "base.html" %}
{% block content %}

<div class="page-head">
  <div>
    <h1>AI Timers</h1>
    <p class="muted">Активные задачи и архив таймеров</p>
  </div>
  <button class="btn primary" onclick="syncTimers()">Обновить</button>
</div>

<!-- ACTIVE -->
<div class="card">
  <h3>Активные</h3>
  <div id="activeTimers"></div>
</div>

<!-- DONE -->
<div class="card">
  <details>
    <summary>Завершённые</summary>
    <div id="doneTimers"></div>
  </details>
</div>

<style>
.timer-card{
  border:1px solid rgba(120,160,220,.25);
  border-radius:16px;
  padding:14px;
  background:rgba(2,8,23,.35);
  margin-bottom:10px;
}
.timer-title{
  font-weight:900;
  color:#fff;
  margin-bottom:6px;
}
.timer-meta{
  font-size:13px;
  color:#9fb3d1;
}
.timer-row{
  display:flex;
  justify-content:space-between;
}
.badge{
  padding:3px 8px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
}
.running{background:#ffb84822;color:#ffd89b}
.done{background:#7ee78722;color:#dfffe5}
.error{background:#ff5f7422;color:#ff9aa9}
.canceled{background:#99999933;color:#ddd}
.verified{background:#7ee78722;color:#dfffe5}
</style>

<script>

let timersCache = []

function fmt(ts){
  if(!ts) return "—"
  return new Date(ts*1000).toLocaleTimeString()
}

function remaining(t){
  if(!t.due_at) return "—"
  const sec = Math.round(t.due_at - Date.now()/1000)
  if(sec <= 0) return "0"
  return sec
}

function render(){
  const active = []
  const done = []

  timersCache.forEach(t=>{
    if(t.status === "done" || t.status === "error"){
      done.push(t)
    } else {
      active.push(t)
    }
  })

  document.getElementById("activeTimers").innerHTML =
    active.length ? active.map(card).join("") : "<div class='muted'>нет активных</div>"

  document.getElementById("doneTimers").innerHTML =
    done.length ? done.map(card).join("") : "<div class='muted'>пусто</div>"
}

function card(t){
  const isActive = !(t.status === "done" || t.status === "error" || t.status === "canceled")
  const verified = t.result && t.result.verified
  const stopBtn = isActive ? `<button class="btn" onclick="cancelTimer('${t.timer_id}')">Остановить</button>` : ""
  const verifyBadge = verified ? `<span class="badge verified">verified</span>` : ""

  return `
  <div class="timer-card">
    <div class="timer-title">
      <span class="badge ${t.status}">${t.status}</span>
      ${verifyBadge}
      ${t.action_key} → ${t.followup_action_key}
    </div>

    <div class="timer-meta">
      ${t.source_text || ""}
    </div>

    <div class="timer-row">
      <div>⏱ ${remaining(t)} сек</div>
      <div>${fmt(t.due_at)}</div>
    </div>

    <div style="margin-top:10px">${stopBtn}</div>

    ${t.result ? `<details><summary>result</summary><pre>${JSON.stringify(t.result, null, 2)}</pre></details>` : ""}
  </div>
  `
}
async function cancelTimer(timerId){
  if(!confirm("Остановить таймер?")) return
  await fetch("/api/ai/timers/cancel/" + encodeURIComponent(timerId), {method:"POST"})
  await syncTimers()
}

// 🔁 sync с сервером (редко!)
async function syncTimers(){
  const r = await fetch("/api/ai/timers")
  const d = await r.json()
  timersCache = d.items || []
  render()
}

// ⚡ realtime countdown (без API)
setInterval(()=>{
  render()
}, 1000)

// 📡 обновление с сервера раз в 15 сек
setInterval(syncTimers, 15000)

window.addEventListener("load", syncTimers)

</script>

{% endblock %}
