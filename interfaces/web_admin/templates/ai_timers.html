{% extends "base.html" %}
{% block content %}
<div class="page-head">
  <div>
    <h1>AI Timers</h1>
    <p class="muted">Активные и завершённые таймеры после AI/ASK-команд.</p>
  </div>
  <button class="btn primary" onclick="loadTimers()">Обновить</button>
</div>

<div class="card">
  <div id="timersBox" class="muted">Загрузка...</div>
</div>

<style>
.timer-list{display:flex;flex-direction:column;gap:12px}
.timer-card{border:1px solid rgba(120,160,220,.25);border-radius:16px;padding:14px;background:rgba(2,8,23,.35)}
.timer-title{font-weight:900;color:#fff;margin-bottom:8px}
.timer-grid{display:grid;grid-template-columns:160px 1fr;gap:6px 12px;font-size:14px}
.timer-grid div{word-break:break-word}
.badge{display:inline-block;padding:4px 8px;border-radius:999px;font-weight:900;font-size:12px}
.badge.running{background:rgba(255,184,107,.16);color:#ffd89b;border:1px solid rgba(255,184,107,.35)}
.badge.executing{background:rgba(143,179,255,.16);color:#dce8ff;border:1px solid rgba(143,179,255,.35)}
.badge.done{background:rgba(126,231,135,.12);color:#dfffe5;border:1px solid rgba(126,231,135,.25)}
.badge.error{background:rgba(255,90,90,.14);color:#ffb3b3;border:1px solid rgba(255,90,90,.35)}
pre{white-space:pre-wrap;word-break:break-word}
</style>

<script>
function fmtTs(ts){
  if(!ts) return "—";
  return new Date(ts * 1000).toLocaleString();
}
function remaining(due){
  if(!due) return "—";
  const sec = Math.round(due - Date.now()/1000);
  if(sec <= 0) return "срок наступил";
  return sec + " сек";
}
async function loadTimers(){
  const box = document.getElementById("timersBox");
  box.textContent = "Загрузка...";
  try{
    const r = await fetch("/api/ai/timers?ts=" + Date.now(), {cache:"no-store"});
    const data = await r.json();
    const items = data.items || [];
    if(!items.length){
      box.innerHTML = "<div class='muted'>Таймеров пока нет.</div>";
      return;
    }
    box.innerHTML = "<div class='timer-list'>" + items.map(t => `
      <div class="timer-card">
        <div class="timer-title">
          <span class="badge ${t.status || 'running'}">${t.status || 'running'}</span>
          ${t.action_key || '—'} → ${t.followup_action_key || '—'}
        </div>
        <div class="timer-grid">
          <div class="muted">timer_id</div><div>${t.timer_id || '—'}</div>
          <div class="muted">длительность</div><div>${t.duration_seconds || '—'} сек</div>
          <div class="muted">создан</div><div>${fmtTs(t.created_at)}</div>
          <div class="muted">сработает</div><div>${fmtTs(t.due_at)} (${remaining(t.due_at)})</div>
          <div class="muted">команда</div><div>${t.source_text || '—'}</div>
          <div class="muted">ошибка</div><div>${t.error || '—'}</div>
        </div>
        ${t.result ? `<details><summary>result</summary><pre>${JSON.stringify(t.result, null, 2)}</pre></details>` : ""}
      </div>
    `).join("") + "</div>";
  }catch(e){
    box.innerHTML = "<div class='muted'>Ошибка загрузки таймеров: " + e + "</div>";
  }
}
window.addEventListener("load", loadTimers);
setInterval(loadTimers, 3000);
</script>
{% endblock %}
