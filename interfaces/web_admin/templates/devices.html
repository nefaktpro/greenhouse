{% extends "base.html" %}

{% block content %}
<section class="page">
  <div class="page-header">
    <div>
      <h1>Devices</h1>
      <p>Registry DB: устройства из devices.csv/action_map/capabilities через SQLite index.</p>
    </div>
    <div class="actions">
      <button class="btn" onclick="syncRegistry()">Sync registry.db</button>
      <button class="btn" onclick="loadDevices()">Обновить</button>
    </div>
  </div>

  <div class="card">
    <h2>Registry stats</h2>
    <pre id="statsBox">Загрузка...</pre>
  </div>

  <div class="card">
    <h2>Фильтры</h2>
    <div class="actions" style="gap: 10px; flex-wrap: wrap;">
      <input id="q" placeholder="поиск: role/entity/name/id/zone" style="min-width: 320px;" onkeydown="if(event.key==='Enter') loadDevices()">
      <label><input type="checkbox" id="onlyEntities"> только entity</label>
      <label><input type="checkbox" id="onlyControllable"> только controllable</label>
      <label><input type="checkbox" id="noPassport"> без passport</label>
      <label><input type="checkbox" id="withPassport"> с passport</label>
      <button class="btn" onclick="loadDevices()">Применить</button>
      <button class="btn" onclick="resetFilters()">Сброс</button>
    </div>
  </div>

  <div class="card">
    <h2>Devices</h2>
    <div id="devicesStatus" class="muted">Загрузка...</div>
    <div style="overflow:auto;">
      <table class="table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Type</th>
            <th>Entity</th>
            <th>Role</th>
            <th>Zone</th>
            <th>Ctrl</th>
            <th>Passport</th>
          </tr>
        </thead>
        <tbody id="devicesRows"></tbody>
      </table>
    </div>
  </div>
</section>

<script>
async function syncRegistry() {
  const res = await fetch("/api/registry-db/sync", {method: "POST"});
  const data = await res.json();
  alert(JSON.stringify(data, null, 2));
  await loadDevices();
}

function boolParam(id) {
  return document.getElementById(id).checked ? "true" : "";
}

function resetFilters() {
  document.getElementById("q").value = "";
  document.getElementById("onlyEntities").checked = false;
  document.getElementById("onlyControllable").checked = false;
  document.getElementById("noPassport").checked = false;
  document.getElementById("withPassport").checked = false;
  loadDevices();
}

async function loadDevices() {
  const stats = await (await fetch("/api/registry-db/stats")).json();
  document.getElementById("statsBox").textContent = JSON.stringify(stats, null, 2);

  const params = new URLSearchParams();
  params.set("limit", "1000");

  const q = document.getElementById("q").value.trim();
  if (q) params.set("q", q);

  if (document.getElementById("onlyEntities").checked) params.set("has_entity", "true");
  if (document.getElementById("onlyControllable").checked) params.set("controllable", "true");

  const noPassport = document.getElementById("noPassport").checked;
  const withPassport = document.getElementById("withPassport").checked;
  if (noPassport && !withPassport) params.set("has_passport", "false");
  if (withPassport && !noPassport) params.set("has_passport", "true");

  const data = await (await fetch("/api/registry-db/devices?" + params.toString())).json();
  document.getElementById("devicesStatus").textContent = `Всего показано: ${data.count}`;

  document.getElementById("devicesRows").innerHTML = data.items.map(d => `
    <tr>
      <td>${escapeHtml(d.id)}</td>
      <td>${escapeHtml(d.name)}</td>
      <td>${escapeHtml(d.type)}</td>
      <td><code>${escapeHtml(d.entity_id || "")}</code></td>
      <td><code>${escapeHtml(d.logical_role || "")}</code></td>
      <td>${escapeHtml(d.zone || "")}</td>
      <td>${Number(d.controllable || 0) ? "✅" : ""}</td>
      <td>
        ${d.logical_role ? `<a href="/web/passports?role=${encodeURIComponent(d.logical_role)}">${Number(d.has_passport || 0) ? "✅ edit" : "➕ create"}</a>` : ""}
      </td>
    </tr>
  `).join("");
}

function escapeHtml(s) {
  return String(s ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

loadDevices();
</script>
{% endblock %}
