{% extends "base.html" %}
{% block content %}

<h1>Условия / Rules</h1>
<p>Правило: если датчик соответствует условию → выполнить реальный action_key через execution pipeline.</p>

<section class="card">
  <h2>Создать условие</h2>

  <label>Название</label>
  <input id="title" placeholder="Температура ниже 20 → включить">

  <label>Entity ID датчика</label>
  <input id="entity" placeholder="sensor.temperature_upper">

  <label>Оператор</label>
  <select id="op">
    <option value="<">&lt;</option>
    <option value="<=">&lt;=</option>
    <option value=">">&gt;</option>
    <option value=">=">&gt;=</option>
    <option value="==">=</option>
    <option value="!=">!=</option>
  </select>

  <label>Значение</label>
  <input id="value" placeholder="20">

  <label>Action key</label>
  <input id="action" placeholder="fan_top_on">

  <label>Cooldown, сек</label>
  <input id="cooldown" value="1800">

  <button onclick="createRule()">Создать</button>
</section>

<section class="card">
  <h2>Список условий</h2>
  <button onclick="loadRules()">Обновить</button>
  <button onclick="runDry()">Проверить все dry-run</button>
  <button onclick="runReal()">Запустить проверку REAL</button>
  <button onclick="loadLogs()">Статус worker / лог</button>
  <div id="rules"></div>
</section>

<section class="card">
  <h2>Лог</h2>
  <button onclick="loadLogs()">Обновить лог</button>
  <pre id="logs"></pre>
</section>

<style>
.card { padding:16px; margin:16px 0; border-radius:16px; background:rgba(255,255,255,.04); }
input, select { display:block; width:100%; max-width:620px; padding:8px; margin:6px 0 12px; }
button { margin:4px 6px 4px 0; }
.rule { padding:12px; margin:10px 0; border:1px solid rgba(255,255,255,.12); border-radius:12px; }
.muted { opacity:.7; font-size:.9em; }
pre { white-space:pre-wrap; max-height:360px; overflow:auto; }
</style>

<script>
async function api(path, opts={}) {
  const r = await fetch(path, opts);
  return await r.json();
}

async function loadRules() {
  const data = await api('/api/rules');
  const box = document.getElementById('rules');
  box.innerHTML = '';

  (data.items || []).forEach(rule => {
    const c = rule.condition || {};
    const actions = rule.action_keys || (rule.action_key ? [rule.action_key] : []);
    const div = document.createElement('div');
    div.className = 'rule';
    div.innerHTML = `
      <b>${rule.enabled ? '🟢' : '⚪'} ${rule.title}</b>
      <div class="muted">${c.entity_id} ${c.operator} ${c.value} → ${actions.join(', ')}</div>
      <div class="muted">id: ${rule.rule_id} | cooldown: ${rule.cooldown_sec}s | last: ${rule.last_run_at || '-'}</div>
      <button onclick="enableRule('${rule.rule_id}')">Включить</button>
      <button onclick="disableRule('${rule.rule_id}')">Выключить</button>
      <button onclick="testRule('${rule.rule_id}')">Тест</button>
      <button onclick="runOneDry('${rule.rule_id}')">Run one dry</button>
      <button onclick="runOneReal('${rule.rule_id}')">REAL one</button>
      <button onclick="deleteRule('${rule.rule_id}')">Удалить</button>
      <pre id="test_${rule.rule_id}"></pre>
    `;
    box.appendChild(div);
  });
}

async function createRule() {
  const payload = {
    title: document.getElementById('title').value || 'Новое условие',
    entity_id: document.getElementById('entity').value,
    operator: document.getElementById('op').value,
    value: document.getElementById('value').value,
    action_key: document.getElementById('action').value,
    cooldown_sec: Number(document.getElementById('cooldown').value || 1800),
    enabled: true
  };

  await api('/api/rules', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });

  await loadRules();
  await loadLogs();
}

async function enableRule(id) {
  await api(`/api/rules/${id}/enable`, {method:'POST'});
  await loadRules();
}

async function disableRule(id) {
  await api(`/api/rules/${id}/disable`, {method:'POST'});
  await loadRules();
}

async function deleteRule(id) {
  await api(`/api/rules/${id}`, {method:'DELETE'});
  await loadRules();
  await loadLogs();
}

async function testRule(id) {
  const data = await api(`/api/rules/${id}/test`, {method:'POST'});
  document.getElementById(`test_${id}`).textContent = JSON.stringify(data, null, 2);
}

async function runOneDry(id) {
  const data = await api(`/api/rules/${id}/run?dry_run=true`, {method:'POST'});
  document.getElementById(`test_${id}`).textContent = JSON.stringify(data, null, 2);
  await loadLogs();
}

async function runOneReal(id) {
  const ok = confirm('REAL RUN одного правила: если condition TRUE, action_key реально выполнится через execution. Продолжить?');
  if (!ok) return;
  const data = await api(`/api/rules/${id}/run?dry_run=false`, {method:'POST'});
  document.getElementById(`test_${id}`).textContent = JSON.stringify(data, null, 2);
  await loadRules();
  await loadLogs();
}

async function runDry() {
  const data = await api('/api/rules/run-once?dry_run=true', {method:'POST'});
  alert(JSON.stringify(data, null, 2));
  await loadLogs();
}

async function runReal() {
  const ok = confirm('REAL RUN: если условие TRUE, action_key реально выполнится через execution. Продолжить?');
  if (!ok) return;
  const data = await api('/api/rules/run-once?dry_run=false', {method:'POST'});
  alert(JSON.stringify(data, null, 2));
  await loadRules();
  await loadLogs();
}

async function loadLogs() {
  const data = await api('/api/rules/logs?limit=50');
  document.getElementById('logs').textContent = JSON.stringify(data.items || [], null, 2);
}

loadRules();
loadLogs();
</script>

{% endblock %}
