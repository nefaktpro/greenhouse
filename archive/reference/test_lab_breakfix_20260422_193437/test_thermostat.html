{% extends "base.html" %}
{% block content %}
<section class="page-section">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px;">
    <h1>🌡️ Термостат веранда</h1>
    <div style="padding:10px 14px;border-radius:999px;background:rgba(255,96,96,.15);border:1px solid rgba(255,96,96,.35);color:#ffb4b4;font-weight:700;">TEST / НА УДАЛЕНИЕ</div>
  </div>

  <div class="card-grid">
    <div class="card">
      <h3>Текущее состояние</h3>
      <pre id="thermoBox">loading...</pre>
    </div>

    <div class="card">
      <h3>Уставка</h3>
      <input id="targetInput" type="number" step="0.5" style="width:140px;">
      <button id="setTargetBtn">Set</button>
      <button id="plusBtn">+</button>
      <button id="minusBtn">-</button>
    </div>

    <div class="card">
      <h3>Переключатели</h3>
      <button id="childBtn">Toggle child lock</button>
      <button id="frostBtn">Toggle frost</button>
    </div>

    <div class="card">
      <h3>Temperature correction</h3>
      <input id="corrInput" type="number" step="0.1" style="width:140px;">
      <button id="setCorrBtn">Apply</button>
    </div>
  </div>
</section>

<script>
let thermoState = null;

async function postJson(url, body){
  const r = await fetch(url, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(body)
  });
  if(!r.ok) throw new Error(await r.text());
  return await r.json();
}

async function loadThermo(){
  const r = await fetch("/api/test/thermostat/state");
  const data = await r.json();
  thermoState = data;
  document.getElementById("thermoBox").textContent = JSON.stringify(data, null, 2);

  const attrs = data.main?.attributes || {};
  if (attrs.temperature !== undefined) {
    document.getElementById("targetInput").value = attrs.temperature;
  }
  if (data.temperature_correction?.state !== undefined) {
    document.getElementById("corrInput").value = data.temperature_correction.state;
  }
}

document.getElementById("setTargetBtn").onclick = async () => {
  const value = Number(document.getElementById("targetInput").value);
  await postJson("/api/test/thermostat/set_temperature", {value});
  await loadThermo();
};

document.getElementById("plusBtn").onclick = async () => {
  const value = Number(document.getElementById("targetInput").value || 20) + 0.5;
  await postJson("/api/test/thermostat/set_temperature", {value});
  await loadThermo();
};

document.getElementById("minusBtn").onclick = async () => {
  const value = Number(document.getElementById("targetInput").value || 20) - 0.5;
  await postJson("/api/test/thermostat/set_temperature", {value});
  await loadThermo();
};

document.getElementById("childBtn").onclick = async () => {
  const current = thermoState?.child_lock?.state === "on";
  await postJson("/api/test/thermostat/set_child_lock", {enabled: !current});
  await loadThermo();
};

document.getElementById("frostBtn").onclick = async () => {
  const current = thermoState?.frost_protection?.state === "on";
  await postJson("/api/test/thermostat/set_frost", {enabled: !current});
  await loadThermo();
};

document.getElementById("setCorrBtn").onclick = async () => {
  const value = Number(document.getElementById("corrInput").value);
  await postJson("/api/test/thermostat/set_correction", {value});
  await loadThermo();
};

loadThermo();
</script>
{% endblock %}
