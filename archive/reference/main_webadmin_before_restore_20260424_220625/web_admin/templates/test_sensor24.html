{% extends "base.html" %}

{% block content %}
<style>
  .test-badge{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;background:rgba(255,96,96,.15);border:1px solid rgba(255,96,96,.35);color:#ffb4b4;font-weight:700}
  .top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px}
  .grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
  .panel{border-radius:28px;padding:24px;background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.025));border:1px solid rgba(120,170,255,.18)}
  .metric{border-radius:22px;padding:18px;background:rgba(255,255,255,.04);border:1px solid rgba(120,170,255,.14)}
  .metric .k{font-size:13px;opacity:.72;margin-bottom:10px}
  .metric .v{font-size:42px;font-weight:700;line-height:1}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
  .btn{all:unset;cursor:pointer;padding:10px 14px;border-radius:14px;background:rgba(79,156,255,.18);border:1px solid rgba(79,156,255,.22)}
  .chartbox{margin-top:14px;border-radius:22px;padding:14px;background:rgba(255,255,255,.03);border:1px solid rgba(120,170,255,.12)}
  svg{width:100%;height:260px;display:block}
  .legend{display:flex;justify-content:space-between;font-size:13px;opacity:.72;margin-top:8px}
  @media (max-width:1100px){.grid2{grid-template-columns:1fr}}
</style>

<section class="page-section">
  <div class="top">
    <h1>📈 Датчик 24 — Температура и Влажность</h1>
    <div class="test-badge">TEST / НА УДАЛЕНИЕ</div>
  </div>

  <div class="toolbar">
    <button class="btn" onclick="loadSensor24(24)">24 часа</button>
    <button class="btn" onclick="loadSensor24(24*3)">3 дня</button>
    <button class="btn" onclick="loadSensor24(24*7)">7 дней</button>
  </div>

  <div class="grid2">
    <div class="metric">
      <div class="k">Текущая температура</div>
      <div class="v" id="curTemp">--</div>
    </div>
    <div class="metric">
      <div class="k">Текущая влажность</div>
      <div class="v" id="curHum">--</div>
    </div>
  </div>

  <div class="panel" style="margin-top:18px;">
    <h3 style="margin:0 0 14px;">Температура</h3>
    <div class="chartbox">
      <svg id="tempChart" viewBox="0 0 1000 260" preserveAspectRatio="none"></svg>
      <div class="legend"><span id="tempMin">min —</span><span id="tempMax">max —</span></div>
    </div>
  </div>

  <div class="panel" style="margin-top:18px;">
    <h3 style="margin:0 0 14px;">Влажность</h3>
    <div class="chartbox">
      <svg id="humChart" viewBox="0 0 1000 260" preserveAspectRatio="none"></svg>
      <div class="legend"><span id="humMin">min —</span><span id="humMax">max —</span></div>
    </div>
  </div>
</section>

<script>
function makePolyline(points, color){
  if(!points.length){
    return `<text x="20" y="40" fill="rgba(255,255,255,.65)" font-size="18">Нет данных</text>`;
  }

  const values = points.map(p => p.value);
  const min = Math.min(...values);
  const max = Math.max(...values);
  const span = (max - min) || 1;

  const coords = points.map((p, i) => {
    const x = (i / Math.max(1, points.length - 1)) * 980 + 10;
    const y = 240 - ((p.value - min) / span) * 200;
    return `${x},${y}`;
  }).join(" ");

  return {
    svg: `
      <line x1="10" y1="240" x2="990" y2="240" stroke="rgba(255,255,255,.10)" />
      <polyline fill="none" stroke="${color}" stroke-width="4" points="${coords}" />
    `,
    min,
    max
  };
}

async function loadCurrent(){
  const r = await fetch("/api/test/sensor24/state");
  const data = await r.json();
  document.getElementById("curTemp").textContent = (data.temperature?.state ?? "--") + "°C";
  document.getElementById("curHum").textContent = (data.humidity?.state ?? "--") + "%";
}

async function loadSensor24(hours){
  const r = await fetch(`/api/test/sensor24/history?hours=${hours}`);
  const data = await r.json();

  const t = makePolyline(data.temperature || [], "#5cc8ff");
  const h = makePolyline(data.humidity || [], "#6ee7a8");

  document.getElementById("tempChart").innerHTML = typeof t === "string" ? t : t.svg;
  document.getElementById("humChart").innerHTML = typeof h === "string" ? h : h.svg;

  if(typeof t !== "string"){
    document.getElementById("tempMin").textContent = "min " + t.min.toFixed(1) + "°C";
    document.getElementById("tempMax").textContent = "max " + t.max.toFixed(1) + "°C";
  } else {
    document.getElementById("tempMin").textContent = "min —";
    document.getElementById("tempMax").textContent = "max —";
  }

  if(typeof h !== "string"){
    document.getElementById("humMin").textContent = "min " + h.min.toFixed(1) + "%";
    document.getElementById("humMax").textContent = "max " + h.max.toFixed(1) + "%";
  } else {
    document.getElementById("humMin").textContent = "min —";
    document.getElementById("humMax").textContent = "max —";
  }
}

loadCurrent();
loadSensor24(24);
</script>
{% endblock %}
