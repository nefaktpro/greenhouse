{% extends "base.html" %}
{% block content %}
<section class="cards-grid">
  <article class="card wide">
    <div class="card-label">Critical layer</div>
    <h3>Safety / аварийный слой</h3>
    <p class="muted">
      Здесь должен быть отдельный приоритетный слой: пожар, протечка, питание, критические ограничения.
    </p>
    <div class="button-row">
      <button class="primary-btn" onclick="loadSafetyData()">Обновить safety</button>
    </div>
    <pre id="safety-data-box" class="result-box">Загрузка...</pre>
  </article>
</section>
{% endblock %}

{% block scripts %}
<script>
async function loadSafetyData() {
  if (!requireAuth()) return;
  const result = await ghApi("/api/monitoring/safety", { method: "GET" });
  pretty("safety-data-box", result.data);
}

loadSafetyData();
</script>
{% endblock %}
