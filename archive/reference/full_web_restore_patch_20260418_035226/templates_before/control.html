{% extends "base.html" %}
{% block content %}
<section class="cards-grid">
  <article class="card">
    <div class="card-label">Manual actions</div>
    <h3>Быстрые кнопки</h3>
    <div class="button-row wrap">
      <button class="primary-btn" onclick="runAction('fan_top_on')">Верх fan ON</button>
      <button class="ghost-btn" onclick="runAction('fan_top_off')">Верх fan OFF</button>
      <button class="primary-btn" onclick="runAction('fan_bottom_on')">Низ fan ON</button>
      <button class="ghost-btn" onclick="runAction('fan_bottom_off')">Низ fan OFF</button>
    </div>
    <p class="muted">
      Контрольный контур для миграции/verify: вентиляторы.
    </p>
  </article>

  <article class="card">
    <div class="card-label">Custom action</div>
    <h3>Запуск по action_key</h3>
    <div class="form-grid">
      <label>
        <span>action_key</span>
        <input id="action-key" type="text" value="fan_top_on">
      </label>
      <button class="primary-btn" onclick="runCustomAction()">Выполнить</button>
    </div>
  </article>
</section>

<section class="cards-grid">
  <article class="card wide">
    <div class="card-label">Result</div>
    <h3>Результат действия</h3>
    <pre id="action-result" class="result-box">Ожидание...</pre>
  </article>
</section>
{% endblock %}

{% block scripts %}
<script>
async function runAction(actionKey) {
  if (!requireAuth()) return;
  const box = document.getElementById("action-result");
  box.textContent = "Запуск " + actionKey + "...";

  const variants = [
    { url: "/api/actions/execute", body: { action_key: actionKey } },
    { url: "/api/actions/run", body: { action_key: actionKey } },
    { url: "/api/actions/" + encodeURIComponent(actionKey), body: {} },
  ];

  const result = await ghTryPostVariants(variants);
  pretty("action-result", result);
}

function runCustomAction() {
  const actionKey = document.getElementById("action-key").value.trim();
  if (!actionKey) return;
  runAction(actionKey);
}
</script>
{% endblock %}
