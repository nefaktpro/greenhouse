{% extends "base.html" %}
{% block content %}
<section class="hero-card narrow">
  <div class="hero-kicker">Локальный защищённый вход</div>
  <h2>Вход в Web Admin</h2>
  <p class="muted">После входа откроется общий dashboard с режимом, ASK, monitoring и safety.</p>

  <form id="login-form" class="form-grid">
    <label>
      <span>Логин</span>
      <input id="username" type="text" value="Mi" autocomplete="username">
    </label>

    <label>
      <span>Пароль</span>
      <input id="password" type="password" autocomplete="current-password">
    </label>

    <button type="submit" class="primary-btn">Войти</button>
  </form>

  <pre id="login-result" class="result-box">Ожидание входа...</pre>
</section>
{% endblock %}

{% block scripts %}
<script>
document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const result = document.getElementById("login-result");
  result.textContent = "Выполняю вход...";

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;

  const { resp, data } = await ghApi("/api/auth/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password }),
    auth: false
  });

  if (!resp.ok || !data || !data.access_token) {
    result.textContent = JSON.stringify(data, null, 2);
    return;
  }

  localStorage.setItem("gh_token", data.access_token);
  result.textContent = "Успешный вход";
  window.location.href = "/web/";
});
</script>
{% endblock %}
